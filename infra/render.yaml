# LEGADO — Render Blueprint do backend do site TRCon.
#
# A rota oficial de produção agora é Cloudflare + Hetzner + Coolify + Neon.
# Este arquivo permanece apenas como referência histórica até ser removido.
#
# Uso legado: no Render, "New → Blueprint" apontando para este repositório.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: trcon-site-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free # suficiente para a fase inicial; suba de plano quando justificar
    region: virginia # projeto Neon em AWS us-east-1 (N. Virginia) — manter perto
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Render injeta PORT automaticamente (application.yml já o lê).

      # --- Conexão com o Neon (definir no painel; sync:false = não versionado) ---
      # DB_URL é a JDBC URL do Neon SEM "-pooler" (evita conflito de prepared
      # statements do Hibernate com o PgBouncer em modo transação) e SEM
      # channel_binding (parâmetro libpq, não reconhecido pelo driver JDBC).
      # Exemplo: jdbc:postgresql://ep-xxx.us-east-1.aws.neon.tech/trcon_site?sslmode=require
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false

      # Origem do frontend permitida no CORS.
      # Ex.: https://trcon-site.pages.dev  ou  https://trcongroup.com.br
      - key: TRCON_CORS_ALLOWED_ORIGINS
        sync: false
