# Render Blueprint — deploy do site TRCon (backend + Postgres + frontend estático).
# Uso: no painel do Render, "New" -> "Blueprint" apontando para este repositório.
# Docs: https://render.com/docs/blueprint-spec
#
# Planos "free"/"starter" cobrem a fase inicial (baixo tráfego). Ajuste `plan`
# conforme necessidade. Ver doc/12-DEPLOY.md e doc/09-PLANO-EXECUCAO-IA.md (custos).

databases:
  - name: trcon-site-db
    databaseName: trcon_site
    user: trcon
    plan: free # 90 dias no free; migrar para starter quando justificar

services:
  # --- Backend (Java/Spring Boot em container) ---
  - type: web
    name: trcon-site-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Render injeta PORT automaticamente; o application.yml já o lê.
      - key: DB_HOST
        fromDatabase:
          name: trcon-site-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: trcon-site-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: trcon-site-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: trcon-site-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: trcon-site-db
          property: password
      # Origem do frontend permitida no CORS (ajuste para o domínio real).
      - key: TRCON_CORS_ALLOWED_ORIGINS
        sync: false # definir no painel: ex. https://trcongroup.com.br

  # --- Frontend estático ---
  - type: web
    name: trcon-site-frontend
    runtime: static
    buildCommand: "" # site estático puro, sem build
    staticPublishPath: ./frontend
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
