name: trcon-site

services:
  postgres:
    image: postgres:16-alpine
    container_name: trcon-site-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-trcon_site}
      POSTGRES_USER: ${DB_USERNAME:-trcon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trcon}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - trcon_site_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-trcon} -d ${DB_NAME:-trcon_site}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: trcon-site-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-trcon_site}
      DB_USERNAME: ${DB_USERNAME:-trcon}
      DB_PASSWORD: ${DB_PASSWORD:-trcon}
      TRCON_CORS_ALLOWED_ORIGINS: ${TRCON_CORS_ALLOWED_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  trcon_site_pgdata:
    name: trcon_site_pgdata
