# Perfil local — alinhado com infra/docker-compose.yml (Postgres em localhost:5434 quando 5432 está ocupada)
# Porta 8081 evita conflito com sirius-marketing (8080).
server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/trcon_site}
    username: ${DB_USERNAME:trcon}
    password: ${DB_PASSWORD:trcon}

trcon:
  site:
    cors:
      allowed-origins: ${TRCON_CORS_ALLOWED_ORIGINS:http://localhost:4173,http://127.0.0.1:4173}
    internal-api-key: ${TRCON_SITE_INTERNAL_API_KEY:dev-internal-key-change-me}

logging:
  level:
    br.com.trcon.site: DEBUG


