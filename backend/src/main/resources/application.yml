server:
  # Coolify e outros provedores injetam a porta via env PORT.
  port: ${PORT:8080}

spring:
  application:
    name: site-backend
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

trcon:
  site:
    cors:
      allowed-origins: ${TRCON_CORS_ALLOWED_ORIGINS}
    internal-api-key: ${TRCON_SITE_INTERNAL_API_KEY}
