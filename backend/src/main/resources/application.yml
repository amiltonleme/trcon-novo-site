server:
  # Provedores de nuvem (Render, Fly, Railway) injetam a porta via env PORT.
  port: ${PORT:8080}

spring:
  application:
    name: site-backend
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

trcon:
  site:
    cors:
      allowed-origins: ${TRCON_CORS_ALLOWED_ORIGINS:http://localhost:5500}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/trcon_site
    username: ${DB_USERNAME:trcon}
    password: ${DB_PASSWORD:trcon}
logging:
  level:
    br.com.trcon.site: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    # Aceita DB_URL pronta (ex.: docker-compose) OU compõe a partir das partes
    # (host/porta/nome) que provedores gerenciados costumam expor separadamente.
    url: ${DB_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
management:
  endpoint:
    health:
      show-details: never
