spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

trcon:
  site:
    cors:
      allowed-origins: ${TRCON_CORS_ALLOWED_ORIGINS}
    internal-api-key: ${TRCON_SITE_INTERNAL_API_KEY}

management:
  endpoint:
    health:
      show-details: never
