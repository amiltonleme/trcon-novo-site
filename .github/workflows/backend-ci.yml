name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  build-test:
    name: Build, test e gate de cobertura (>= 80%)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Testcontainers usa o Docker já disponível no runner ubuntu-latest.
      # Em Linux não é necessário o ajuste de api.version exigido no Windows local.
      - name: Build, testes e verificação de cobertura
        run: ./mvnw -B clean verify

      - name: Publicar relatório JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: warn
