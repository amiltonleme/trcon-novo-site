name: Backend CD

# Deploy do backend em produção.
#
# Estratégia oficial atual:
# - Coolify no Hetzner faz deploy por integração Git/webhook após CI verde.
# - Fly.io permanece apenas como caminho legado quando DEPLOY_TARGET=fly.
#
# O job só roda quando o secret existe — em forks/clones sem credenciais ele é
# pulado, sem falhar o repositório.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/fly.toml"
      - ".github/workflows/backend-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-fly:
    name: Deploy backend (Fly.io)
    runs-on: ubuntu-latest
    # Só executa se o token estiver configurado nos secrets do repositório.
    if: ${{ vars.DEPLOY_TARGET == 'fly' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --config infra/fly.toml --dockerfile backend/Dockerfile ./backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  coolify-note:
    name: Coolify (deploy via Git/webhook)
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_TARGET != 'fly' }}
    steps:
      - name: Info
        run: |
          echo "Produção oficial: Coolify no Hetzner, acionado por integração Git/webhook."
          echo "Nenhuma ação de CD é executada aqui. Ver doc/12-DEPLOY.md."
